spring.application.name=BugNest

# Database Configuration
# Set BUGNEST_DB_USER / BUGNEST_DB_PASSWORD in production; empty password breaks SCRAM auth.
spring.datasource.url=jdbc:postgresql://localhost:5432/bugnest
spring.datasource.username=${BUGNEST_DB_USER:postgres}
spring.datasource.password=${BUGNEST_DB_PASSWORD:postgres123}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
app.jwtSecret=BugNestSecretKeyForJwtTokenGenerationMakeItLongEnoughToServeAsAValidSecretKey
app.jwtExpirationMs=86400000

# Email Configuration (SMTP)
# REPLACE THESE WITH YOUR REAL CREDENTIALS
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_EMAIL@gmail.com
spring.mail.password=YOUR_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# AI (OpenAI-compatible chat completions). Optional: omit key to use heuristic-only suggestions.
app.ai.openai.api-key=${BUGNEST_OPENAI_API_KEY:""}
app.ai.openai.base-url=https://api.openai.com
app.ai.openai.model=gpt-4o-mini
